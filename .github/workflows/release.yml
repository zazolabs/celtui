name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
          - target: x86_64-apple-darwin
            runner: macos-14
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM64 Linux)
        if: matrix.use_cross
        run: cargo install cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-

      - name: Install Linux dependencies (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Linux dependencies (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p celtui
          else
            cargo build --release --target ${{ matrix.target }} -p celtui
          fi
        shell: bash

      - name: Set binary name
        id: binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "name=celtui.exe" >> $GITHUB_OUTPUT
          else
            echo "name=celtui" >> $GITHUB_OUTPUT
          fi

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip "target/${{ matrix.target }}/release/${{ steps.binary.outputs.name }}"
          else
            strip "target/${{ matrix.target }}/release/${{ steps.binary.outputs.name }}"
          fi

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p celtui-${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/${{ steps.binary.outputs.name }}" celtui-${{ matrix.target }}/
          tar -czf celtui-${{ matrix.target }}.tar.gz celtui-${{ matrix.target }}/

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "celtui-${{ matrix.target }}" -Force
          Copy-Item "target/${{ matrix.target }}/release/${{ steps.binary.outputs.name }}" -Destination "celtui-${{ matrix.target }}/"
          Compress-Archive -Path "celtui-${{ matrix.target }}" -DestinationPath "celtui-${{ matrix.target }}.zip"

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: celtui-${{ matrix.target }}
          path: celtui-${{ matrix.target }}.tar.gz
          retention-days: 1

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: celtui-${{ matrix.target }}
          path: celtui-${{ matrix.target }}.zip
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -name "*.tar.gz" -o -name "*.zip" | while read file; do
            cp "$file" release-assets/
          done
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
